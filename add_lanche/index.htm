<!DOCTYPE html>
<html lang="pt-br">

<head>

    <title>Document</title>
    <link rel="stylesheet" href="estilo.css">
</head>

<body>

    <header id="header">
        <h1>Site de vendas de Lanches</h1>
        <div id="OpcoesHeader">

            <div>

            </div>
        </div>
    </header>

    <section class="form-card">
        <div class="grupo-input">
            <label for="titulo">Título do Código</label>
            <input type="text" id="titulo" placeholder="Nome do Lanche">

        <div class="grupo-input">
            <label for="descricao">Descrição</label>
            <input type="text" id="descricao" placeholder="Descrição do Lanche">
        </div>
        <div class="grupo-input">
            <label for="quantidade">quantidade</label>
            <textarea id="quantidade" placeholder="quantidade de lanche"></textarea>
        </div>
        <button class="btn-salvar" id="btnSalvar">Salvar</button>
    </section>

    <script src="scrypt.js" type="module"></script>
